services:
  redis:
    image: redis:7-alpine
    container_name: dip-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./services/postgres/data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"
    restart: unless-stopped

  producer:
    build:
      context: .
      dockerfile: services/producer/Dockerfile
    env_file: .env
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    volumes:
      - ./services/producer/sample-video:/app/services/producer/sample-video:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/worker/output:/app/services/worker/output
      - ./services/worker/.cache/ultralytics:/root/.cache/ultralytics
    restart: unless-stopped
    gpus: all